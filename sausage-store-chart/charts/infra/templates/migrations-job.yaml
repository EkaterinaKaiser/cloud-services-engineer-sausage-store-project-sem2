{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "infra.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "infra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: {{ .Values.migrations.image }}
          imagePullPolicy: {{ .Values.migrations.imagePullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h postgresql -p 5432 -U {{ .Values.postgresql.env.POSTGRES_USER }}; do
                echo "PostgreSQL is unavailable - sleeping"
                sleep 2
              done
              echo "PostgreSQL is ready - executing migrations"
              
              # Execute migrations in order
              psql -h postgresql -p 5432 -U {{ .Values.postgresql.env.POSTGRES_USER }} -d {{ .Values.postgresql.env.POSTGRES_DB }} -f /migrations/V001__create_tables.sql
              psql -h postgresql -p 5432 -U {{ .Values.postgresql.env.POSTGRES_USER }} -d {{ .Values.postgresql.env.POSTGRES_DB }} -f /migrations/V002__change_schema.sql
              psql -h postgresql -p 5432 -U {{ .Values.postgresql.env.POSTGRES_USER }} -d {{ .Values.postgresql.env.POSTGRES_DB }} -f /migrations/V003__insert_data.sql
              psql -h postgresql -p 5432 -U {{ .Values.postgresql.env.POSTGRES_USER }} -d {{ .Values.postgresql.env.POSTGRES_DB }} -f /migrations/V004__create_index.sql
              
              echo "Migrations completed successfully"
          env:
            - name: PGPASSWORD
              value: {{ .Values.postgresql.env.POSTGRES_PASSWORD }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: migrations-config
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations-config
          configMap:
            name: migrations-config
{{- end }}
