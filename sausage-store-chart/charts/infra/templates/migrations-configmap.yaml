{{- if .Values.migrations.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: migrations-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "infra.labels" . | nindent 4 }}
data:
  V001__create_tables.sql: |
    CREATE TABLE product (
        id bigint generated by default as identity,
        name varchar(255) not null,
        picture_url varchar(255)
    );

    CREATE TABLE product_info (
        product_id bigint not null,
        name varchar(255) not null,
        price double precision
    );

    CREATE TABLE orders (
        id bigint generated by default as identity,
        status varchar(255)
    );

    CREATE TABLE orders_date (
        order_id bigint not null,
        status varchar(255),
        date_created date default current_date
    );

    CREATE TABLE order_product (
        quantity integer not null,
        order_id bigint not null,
        product_id bigint not null
    );
  V002__change_schema.sql: |
    ALTER TABLE product ADD CONSTRAINT pk_product PRIMARY KEY (id);
    ALTER TABLE orders ADD CONSTRAINT pk_orders PRIMARY KEY (id);

    ALTER TABLE product ADD COLUMN price double precision;

    UPDATE product SET price = pi.price 
    FROM product_info pi 
    WHERE product.id = pi.product_id;

    ALTER TABLE orders ADD COLUMN date_created timestamp DEFAULT current_timestamp;

    UPDATE orders SET date_created = od.date_created 
    FROM orders_date od 
    WHERE orders.id = od.order_id;

    ALTER TABLE order_product ADD CONSTRAINT pk_order_product PRIMARY KEY (order_id, product_id);

    ALTER TABLE order_product 
    ADD CONSTRAINT fk_order_product_order_id 
    FOREIGN KEY (order_id) REFERENCES orders(id);

    ALTER TABLE order_product 
    ADD CONSTRAINT fk_order_product_product_id 
    FOREIGN KEY (product_id) REFERENCES product(id);

    CREATE INDEX idx_orders_status ON orders(status);
    CREATE INDEX idx_orders_date_created ON orders(date_created);
    CREATE INDEX idx_order_product_order_id ON order_product(order_id);
    CREATE INDEX idx_order_product_product_id ON order_product(product_id);
    CREATE INDEX idx_product_name ON product(name);

    DROP TABLE product_info;
    DROP TABLE orders_date;
  V003__insert_data.sql: |
    INSERT INTO product (id, name, picture_url, price) VALUES 
    (1, 'Сливочная', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/6.jpg', 320.00),
    (2, 'Особая', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/5.jpg', 179.00),
    (3, 'Молочная', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/4.jpg', 225.00),
    (4, 'Нюренбергская', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/3.jpg', 315.00),
    (5, 'Мюнхенская', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/2.jpg', 330.00),
    (6, 'Русская', 'https://res.cloudinary.com/sugrobov/image/upload/v1623323635/repos/sausages/1.jpg', 189.00);

    INSERT INTO orders (id, status, date_created) 
    SELECT 
        i, 
        (array['pending', 'shipped', 'cancelled'])[floor(random() * 3 + 1)],
        DATE(NOW() - (random() * (NOW()+'90 days' - NOW())))
    FROM generate_series(1, 10000) s(i);

    INSERT INTO order_product (quantity, order_id, product_id) 
    SELECT 
        floor(1+random()*50)::int, 
        i, 
        1 + floor(random()*6)::int % 6 
    FROM generate_series(1, 10000) s(i);
  V004__create_index.sql: |
    CREATE INDEX order_product_order_id_idx ON order_product(order_id);

    CREATE INDEX orders_status_date_idx ON orders(status, date_created);

    CREATE INDEX order_product_product_id_idx ON order_product(product_id);

    CREATE INDEX orders_date_created_idx ON orders(date_created);

    CREATE INDEX orders_status_idx ON orders(status);

    CREATE INDEX product_name_idx ON product(name);

    CREATE INDEX product_price_idx ON product(price);
{{- end }}
