---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  replicas: {{ .Values.replicas }}
  strategy:
{{ toYaml .Values.strategy | indent 4 }} 
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/path: {{ .Values.annotations.path }}
        prometheus.io/port: "{{ .Values.annotations.port }}"
        prometheus.io/scrape: "{{ .Values.annotations.scrape }}"
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:13
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until pg_isready -h postgresql -p 5432 -U {{ .Values.env.postgresUser }}; do
                echo "PostgreSQL is unavailable - sleeping"
                sleep 2
              done
              echo "PostgreSQL is ready - checking if migrations are needed..."
              
              # Check if product table exists (indicates migrations completed)
              until psql -h postgresql -p 5432 -U {{ .Values.env.postgresUser }} -d sausage-store -c "SELECT 1 FROM product LIMIT 1;" > /dev/null 2>&1; do
                echo "Migrations not completed yet - waiting..."
                sleep 5
              done
              echo "Database is ready - proceeding with backend startup"
          env:
            - name: PGPASSWORD
              value: {{ .Values.env.postgresPassword }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ .Values.image }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.env.postgresUri | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.env.postgresUser | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.env.postgresPassword | quote }}
            - name: REPORT_PATH
              value: {{ .Values.env.reportPath | quote }}
            - name: LOG_PATH
              value: {{ .Values.env.logPath | quote }}
            - name: SPRING_DATA_MONGODB_URI
              value: mongodb://reportuser:reportpassword@mongodb:27017/reports
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }} 