# Пример kubeconfig файла
# Получите актуальный kubeconfig из вашего кластера командой:
# kubectl config view --raw > kubeconfig.yaml
# 
# Затем добавьте содержимое этого файла как секрет KUBE_CONFIG в GitHub

apiVersion: v1
kind: Config
clusters:
- cluster:
    certificate-authority-data: LS0tLS1CRUdJTi...
    server: https://your-cluster-endpoint
  name: your-cluster
contexts:
- context:
    cluster: your-cluster
    user: your-user
  name: your-context
current-context: your-context
users:
- name: your-user
  user:
    token: your-token
