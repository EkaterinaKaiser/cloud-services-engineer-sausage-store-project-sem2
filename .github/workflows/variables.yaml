# GitHub Actions Variables
# Эти переменные нужно настроить в Settings → Secrets and variables → Actions

# Обязательные секреты:
# KUBE_CONFIG - содержимое kubeconfig файла для доступа к Kubernetes кластеру
# DOCKER_USER - имя пользователя Docker Hub
# DOCKER_PASSWORD - пароль Docker Hub
# NEXUS_HELM_REPO - URL репозитория Helm в Nexus
# NEXUS_HELM_REPO_USER - пользователь для Nexus
# NEXUS_HELM_REPO_PASSWORD - пароль для Nexus
# VAULT_TOKEN - токен для Vault (если используется)

# Переменные окружения:
# SAUSAGE_STORE_NAMESPACE - namespace для деплоя (например: sausage-store)
# INGRESS_HOST - домен для Ingress (например: your-hostname.students-projects.ru)

# Дополнительные секреты (опционально):
# POSTGRES_PASSWORD - пароль для PostgreSQL (по умолчанию: storepassword)
# MONGO_ROOT_PASSWORD - пароль root для MongoDB (по умолчанию: rootpassword)

# Автоматически предоставляемые переменные:
# GITHUB_TOKEN - автоматически предоставляется GitHub
# GITHUB_ACTOR - автоматически предоставляется GitHub
# GITHUB_REPOSITORY - автоматически предоставляется GitHub

# Пример настройки kubeconfig:
# 1. Получите kubeconfig из кластера:
#    kubectl config view --raw > kubeconfig.yaml
# 2. Добавьте содержимое файла как секрет KUBE_CONFIG в GitHub
# 3. Удалите локальный файл kubeconfig.yaml

# Пример настройки переменных:
# SAUSAGE_STORE_NAMESPACE=sausage-store
# INGRESS_HOST=your-student-hostname.students-projects.ru
# NEXUS_HELM_REPO=https://nexus.cloud-services-engineer.education-services.ru/repository/your-helm-repo
