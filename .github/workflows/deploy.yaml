name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: r-devops-magistracy-project-2sem-907324971
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  DOCKER_USER: ${{ secrets.DOCKER_USER }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build_and_push_to_docker_hub:
    name: Push Docker image to DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        # Получение исходного кода из репозитория:
        uses: actions/checkout@v3
      - name: Set up Docker Buildx
        # Установка сборщика контейнеров Docker:
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker 
        # Авторизация на Docker Hub:
        uses: docker/login-action@v2
        # При помощи with передаём в action параметры username и password:
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASSWORD }}
          # Хорошо ли держать логин и пароль прямо в коде workflow?
          # Нет, это нехорошо. Хранить пароль надо в Secrets.
      - name: Push Backend to DockerHub
        # Одновременный билд и пуш образа в Docker Hub:
        uses: docker/build-push-action@v4
        with:
          # Параметр context: ./backend/ указывает, что нужный Dockerfile 
          # находится в ./backend/
          context: ./backend/
          # Параметр push: true указывает, что образ нужно не только собрать,
          # но и отправить на Docker Hub:
          push: true
          # В параметре tags задаётся название и тег для образа.
          # Для каждого пересобранного образа 
          # устанавливаем тег latest, чтобы потом
          # на сервере и в docker-compose.yml не указывать версию образа:
          tags: ${{ secrets.DOCKER_USER }}/sausage-backend:latest
          build-args: |
            VERSION=${{ github.sha }}
      - name: Push Frontend to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sausage-frontend:latest
      - name: Push Backend-report to DockerHub
        uses: docker/build-push-action@v4
        with:
          context: ./backend-report/
          push: true
          tags: ${{ secrets.DOCKER_USER }}/sausage-backend-report:latest
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'
      
      - name: Package Helm Chart
        run: |
          cd sausage-store-chart
          helm dependency update
          helm package . --destination ./packages
      
      - name: Upload Helm Chart to Nexus
        run: |
          cd sausage-store-chart
          # Upload the packaged chart to Nexus
          curl -u ${{ env.NEXUS_HELM_REPO_USER }}:${{ env.NEXUS_HELM_REPO_PASSWORD }} \
            --upload-file ./packages/sausage-store-*.tgz \
            ${{ env.NEXUS_HELM_REPO }}/sausage-store-$(date +%Y%m%d%H%M%S).tgz
          
          echo "Helm chart uploaded to Nexus successfully"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'
      
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ env.KUBE_CONFIG }}
      
      - name: Prepare Helm Chart
        run: |
          cd sausage-store-chart
          helm dependency update
          helm package . --destination ./packages
      
      - name: Check if release exists
        run: |
          echo "Checking if release exists..."
          helm list -n ${{ env.SAUSAGE_STORE_NAMESPACE }} || echo "No releases found"
      
      - name: Test Helm Chart (dry-run)
        run: |
          cd sausage-store-chart
          CHART_FILE=$(ls ./packages/sausage-store-*.tgz | head -1)
          echo "Testing chart with dry-run..."
          
          helm install sausage-store $CHART_FILE \
            --namespace ${{ env.SAUSAGE_STORE_NAMESPACE }} \
            --set frontend.image=${{ secrets.DOCKER_USER }}/sausage-frontend:latest \
            --set backend.image=${{ secrets.DOCKER_USER }}/sausage-backend:latest \
            --set backend-report.image=${{ secrets.DOCKER_USER }}/sausage-backend-report:latest \
            --set global.imagePullPolicy=Always \
            --dry-run \
            --debug
      
      - name: Deploy with Helm Chart
        run: |
          cd sausage-store-chart
          CHART_FILE=$(ls ./packages/sausage-store-*.tgz | head -1)
          echo "Using chart file: $CHART_FILE"
          
          # Try to install with minimal timeout
          echo "Installing release..."
          timeout 300 helm install sausage-store $CHART_FILE \
            --namespace ${{ env.SAUSAGE_STORE_NAMESPACE }} \
            --set frontend.image=${{ secrets.DOCKER_USER }}/sausage-frontend:latest \
            --set backend.image=${{ secrets.DOCKER_USER }}/sausage-backend:latest \
            --set backend-report.image=${{ secrets.DOCKER_USER }}/sausage-backend-report:latest \
            --set global.imagePullPolicy=Always \
            --timeout=5m \
            --debug || echo "Helm install completed or timed out"
      
      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl get pods -n ${{ env.SAUSAGE_STORE_NAMESPACE }}
          kubectl get svc -n ${{ env.SAUSAGE_STORE_NAMESPACE }}
          kubectl get ingress -n ${{ env.SAUSAGE_STORE_NAMESPACE }}
          
          echo "Checking migrations job..."
          kubectl get jobs -n ${{ env.SAUSAGE_STORE_NAMESPACE }}
          
          echo "Waiting for deployments to be available..."
          kubectl wait --for=condition=available deployment -l app.kubernetes.io/part-of=sausage-store -n ${{ env.SAUSAGE_STORE_NAMESPACE }} --timeout=300s || echo "Some deployments may not be ready yet"
          
          echo "Checking pod status..."
          kubectl get pods -n ${{ env.SAUSAGE_STORE_NAMESPACE }} -o wide
      
      - name: Run smoke tests
        run: |
          echo "Running basic health checks..."
          
          # Wait for services to be ready
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=backend -n ${{ env.SAUSAGE_STORE_NAMESPACE }} --timeout=120s
          
          # Get service URL
          BACKEND_URL=$(kubectl get svc sausage-store-backend -n ${{ env.SAUSAGE_STORE_NAMESPACE }} -o jsonpath='{.spec.clusterIP}')
          
          # Test backend health endpoint
          kubectl run test-pod --image=curlimages/curl:latest --rm -i --restart=Never -- \
            curl -f http://$BACKEND_URL:8080/health || echo "Backend health check failed"
          
          echo "Smoke tests completed"
      
      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Deployment successful!"
            echo "Application is available at: https://${{ secrets.INGRESS_HOST }}"
          else
            echo "Deployment failed!"
            echo "Check the logs above for details"
          fi